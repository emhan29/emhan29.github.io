<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Project</title>
    <script src="protection.js"></script>
    <script src="../js/protection.js" defer></script>
    <style>
        /* ============================================
           MY PROJECT — MENU 6 PROJECT
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        /* Background glow */
        body::before {
            content: "";
            position: fixed;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(77, 166, 255, 0.03), transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            animation: glowPulse 6s ease-in-out infinite alternate;
        }

        @keyframes glowPulse {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.3;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.6;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 100%;
            max-width: 900px;
        }

        /* ============================================
           HEADER
           ============================================ */
        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 36px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 3px;
        }

        .header h1 span {
            color: #4da6ff;
        }

        .header p {
            color: rgba(255, 255, 255, 0.2);
            font-size: 14px;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* ============================================
           GRID PROJECT
           ============================================ */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px 20px;
        }

        /* ============================================
           PROJECT CARD
           ============================================ */
        .project-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 24px;
            padding: 24px 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .project-card:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        .project-card:active {
            transform: scale(0.96);
        }

        /* ============================================
           ATOM MINI
           ============================================ */
        .atom-mini {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 12px;
        }

        .atom-mini .ring {
            position: absolute;
            border-radius: 50%;
            border: 2.5px solid transparent;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .atom-mini .ring:nth-child(1) {
            animation: spinMini 3s linear infinite;
        }
        .atom-mini .ring:nth-child(2) {
            animation: spinMini 2.5s linear infinite reverse;
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
        }
        .atom-mini .ring:nth-child(3) {
            animation: spinMini 2s linear infinite;
            width: 60%;
            height: 60%;
            top: 20%;
            left: 20%;
        }

        @keyframes spinMini {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .atom-mini .core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
            animation: pulseMini 2s ease-in-out infinite;
        }

        @keyframes pulseMini {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.08);
            }
        }

        /* ============================================
           WARNA-WARNI ATOM
           ============================================ */

        /* 1. BIRU */
        .atom-biru .ring:nth-child(1) {
            border-top-color: #4da6ff;
        }
        .atom-biru .ring:nth-child(2) {
            border-right-color: #66b8ff;
        }
        .atom-biru .ring:nth-child(3) {
            border-bottom-color: #88ccff;
        }
        .atom-biru .core {
            background: radial-gradient(circle, #4da6ff, #1a5a8a);
        }

        /* 2. MERAH */
        .atom-merah .ring:nth-child(1) {
            border-top-color: #ff4757;
        }
        .atom-merah .ring:nth-child(2) {
            border-right-color: #ff6b81;
        }
        .atom-merah .ring:nth-child(3) {
            border-bottom-color: #ff8a9b;
        }
        .atom-merah .core {
            background: radial-gradient(circle, #ff4757, #c0392b);
        }

        /* 3. HIJAU */
        .atom-hijau .ring:nth-child(1) {
            border-top-color: #2ed573;
        }
        .atom-hijau .ring:nth-child(2) {
            border-right-color: #7bed9f;
        }
        .atom-hijau .ring:nth-child(3) {
            border-bottom-color: #a8e6cf;
        }
        .atom-hijau .core {
            background: radial-gradient(circle, #2ed573, #1a8a4a);
        }

        /* 4. UNGU */
        .atom-ungu .ring:nth-child(1) {
            border-top-color: #a29bfe;
        }
        .atom-ungu .ring:nth-child(2) {
            border-right-color: #c8bfff;
        }
        .atom-ungu .ring:nth-child(3) {
            border-bottom-color: #dcd3ff;
        }
        .atom-ungu .core {
            background: radial-gradient(circle, #a29bfe, #6c5ce7);
        }

        /* 5. ORANGE */
        .atom-orange .ring:nth-child(1) {
            border-top-color: #ffa502;
        }
        .atom-orange .ring:nth-child(2) {
            border-right-color: #ffbe76;
        }
        .atom-orange .ring:nth-child(3) {
            border-bottom-color: #ffd79a;
        }
        .atom-orange .core {
            background: radial-gradient(circle, #ffa502, #d35400);
        }

        /* 6. PINK */
        .atom-pink .ring:nth-child(1) {
            border-top-color: #fd79a8;
        }
        .atom-pink .ring:nth-child(2) {
            border-right-color: #ffb8d0;
        }
        .atom-pink .ring:nth-child(3) {
            border-bottom-color: #ffd6e0;
        }
        .atom-pink .core {
            background: radial-gradient(circle, #fd79a8, #e84393);
        }

        /* ===== NAMA PROJECT ===== */
        .project-card .nama {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            margin-top: 4px;
        }

        .project-card .nama span {
            opacity: 0.5;
        }

        .project-card .status {
            display: inline-block;
            margin-top: 6px;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .status.ready {
            background: rgba(46, 213, 115, 0.1);
            border: 1px solid rgba(46, 213, 115, 0.15);
            color: #2ed573;
        }

        .status.coming {
            background: rgba(255, 165, 0, 0.1);
            border: 1px solid rgba(255, 165, 0, 0.15);
            color: #ffa502;
        }

        /* ============================================
           TOMBOL KEMBALI — DI BAWAH GRID
           ============================================ */
        .back-section {
            margin-top: 40px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            padding: 12px 28px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 30px rgba(255, 255, 255, 0.02);
        }

        /* ===== RUDAL BESAR & TERANG ===== */
        .back-btn .rocket {
            display: inline-block;
            font-size: 26px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            animation: rocketFly 1.2s ease-in-out infinite;
            transform-origin: center;
            position: relative;
            line-height: 1;
        }

        .back-btn:hover .rocket {
            color: #ffc107;
            text-shadow: 0 0 30px rgba(255, 193, 7, 0.2);
            animation: rocketFlyFast 0.6s ease-in-out infinite;
        }

        @keyframes rocketFly {
            0% {
                transform: translateY(0px) rotate(-5deg);
            }
            50% {
                transform: translateY(-6px) rotate(5deg);
            }
            100% {
                transform: translateY(0px) rotate(-5deg);
            }
        }

        @keyframes rocketFlyFast {
            0% {
                transform: translateY(0px) rotate(-8deg) scale(1.1);
            }
            50% {
                transform: translateY(-10px) rotate(8deg) scale(1.15);
            }
            100% {
                transform: translateY(0px) rotate(-8deg) scale(1.1);
            }
        }

        /* ===== ASAP RUDAL ===== */
        .back-btn .smoke {
            display: inline-block;
            font-size: 16px;
            opacity: 0;
            animation: smokePuff 1.2s ease-in-out infinite;
            margin-left: -6px;
            color: rgba(255, 255, 255, 0.15);
        }

        .back-btn:hover .smoke {
            color: rgba(255, 193, 7, 0.2);
            animation: smokePuffFast 0.6s ease-in-out infinite;
        }

        @keyframes smokePuff {
            0% {
                opacity: 0;
                transform: translateX(0) scale(0.5);
            }
            30% {
                opacity: 0.5;
                transform: translateX(4px) scale(1);
            }
            60% {
                opacity: 0.2;
                transform: translateX(8px) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translateX(12px) scale(0.8);
            }
        }

        @keyframes smokePuffFast {
            0% {
                opacity: 0;
                transform: translateX(0) scale(0.5);
            }
            30% {
                opacity: 0.7;
                transform: translateX(6px) scale(1.2);
            }
            60% {
                opacity: 0.3;
                transform: translateX(12px) scale(1.4);
            }
            100% {
                opacity: 0;
                transform: translateX(18px) scale(1);
            }
        }

        /* ===== TEKS KEMBALI ===== */
        .back-btn .label {
            font-weight: 600;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }

        .back-btn:hover .label {
            color: #ffffff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
        }

        /* ============================================
           FOOTER — TERANG
           ============================================ */
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .footer span {
            color: #4da6ff;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 700px) {
            .project-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px 16px;
            }
            .header h1 {
                font-size: 28px;
            }
            .atom-mini {
                width: 65px;
                height: 65px;
            }
            .atom-mini .core {
                width: 26px;
                height: 26px;
                font-size: 13px;
            }
            .project-card .nama {
                font-size: 13px;
            }
            .back-btn {
                padding: 10px 20px;
                font-size: 14px;
                gap: 10px;
            }
            .back-btn .rocket {
                font-size: 22px;
            }
            .footer {
                font-size: 12px;
            }
        }

        @media (max-width: 450px) {
            .project-grid {
                grid-template-columns: 1fr 1fr;
                gap: 14px 12px;
            }
            .project-card {
                padding: 16px 10px 14px;
            }
            .atom-mini {
                width: 55px;
                height: 55px;
            }
            .atom-mini .core {
                width: 22px;
                height: 22px;
                font-size: 11px;
            }
            .project-card .nama {
                font-size: 12px;
            }
            .header h1 {
                font-size: 24px;
            }
            .back-btn {
                font-size: 12px;
                padding: 8px 16px;
                gap: 8px;
            }
            .back-btn .rocket {
                font-size: 18px;
            }
            .back-btn .smoke {
                font-size: 12px;
            }
            .footer {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

            <a href="login-token.html" class="project-card" onclick="navigateTo('token.html')">

        </div>

        <!-- ============================================
           TOMBOL KEMBALI — DI BAWAH GRID
           ============================================ -->

            <a href="home-project.html" class="back-btn">

    <!-- ============================================
    SCRIPT: NAVIGASI
    ============================================ -->
    <script>
        // ===== FUNGSI NAVIGASI =====
        function navigateTo(url) {
            const cards = document.querySelectorAll('.project-card');
            cards.forEach(c => c.style.opacity = '0.3');

            setTimeout(function() {
                window.location.href = url;
            }, 300);
        }

        console.log('✅ MY PROJECT — Footer terang + rudal di bawah siap!');

</html>
