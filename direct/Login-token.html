<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ATOM</title>
    <script src="protection.js"></script>
    <script src="../js/protection.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-y: auto;
            /* ← SCROLL DI BODY */
        }

        /* ===== BACKGROUND VIDEO ===== */
        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            display: none;
        }

        /* ===== OVERLAY GELAP ===== */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 2;
            padding: 10px 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 32px 28px 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            /* TIDAK ADA SCROLL DI CARD */
        }

        /* ============================================
           TOMBOL KEMBALI KE MYPROJECT
           ============================================ */
        .back-section {
            text-align: center;
            margin-bottom: 18px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            padding: 6px 18px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .back-btn .rocket {
            display: inline-block;
            font-size: 20px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            animation: rocketFly 1.2s ease-in-out infinite;
            transform-origin: center;
            line-height: 1;
        }

        .back-btn:hover .rocket {
            color: #ffc107;
            text-shadow: 0 0 30px rgba(255, 193, 7, 0.2);
            animation: rocketFlyFast 0.6s ease-in-out infinite;
        }

        @keyframes rocketFly {
            0% {
                transform: translateY(0px) rotate(-5deg);
            }
            50% {
                transform: translateY(-6px) rotate(5deg);
            }
            100% {
                transform: translateY(0px) rotate(-5deg);
            }
        }

        @keyframes rocketFlyFast {
            0% {
                transform: translateY(0px) rotate(-8deg) scale(1.1);
            }
            50% {
                transform: translateY(-10px) rotate(8deg) scale(1.15);
            }
            100% {
                transform: translateY(0px) rotate(-8deg) scale(1.1);
            }
        }

        .back-btn .smoke {
            display: inline-block;
            font-size: 12px;
            opacity: 0;
            animation: smokePuff 1.2s ease-in-out infinite;
            margin-left: -4px;
            color: rgba(255, 255, 255, 0.15);
        }

        .back-btn:hover .smoke {
            color: rgba(255, 193, 7, 0.2);
            animation: smokePuffFast 0.6s ease-in-out infinite;
        }

        @keyframes smokePuff {
            0% {
                opacity: 0;
                transform: translateX(0) scale(0.5);
            }
            30% {
                opacity: 0.5;
                transform: translateX(4px) scale(1);
            }
            60% {
                opacity: 0.2;
                transform: translateX(8px) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translateX(12px) scale(0.8);
            }
        }

        @keyframes smokePuffFast {
            0% {
                opacity: 0;
                transform: translateX(0) scale(0.5);
            }
            30% {
                opacity: 0.7;
                transform: translateX(6px) scale(1.2);
            }
            60% {
                opacity: 0.3;
                transform: translateX(12px) scale(1.4);
            }
            100% {
                opacity: 0;
                transform: translateX(18px) scale(1);
            }
        }

        .back-btn .label {
            font-weight: 500;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }

        .back-btn:hover .label {
            color: #ffffff;
        }

        /* ============================================
           LOGO - ATOM BESAR & KEREN
           ============================================ */
        .logo {
            margin-bottom: 24px;
        }

        .logo .icon-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 12px;
        }

        .logo .icon-wrapper .ring {
            position: absolute;
            border-radius: 50%;
            border: 3px solid transparent;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .logo .icon-wrapper .ring:nth-child(1) {
            border-top-color: #4da6ff;
            animation: spin 3s linear infinite;
        }

        .logo .icon-wrapper .ring:nth-child(2) {
            border-right-color: #66b8ff;
            animation: spin 2.5s linear infinite reverse;
            width: 85%;
            height: 85%;
            top: 7.5%;
            left: 7.5%;
        }

        .logo .icon-wrapper .ring:nth-child(3) {
            border-bottom-color: #88ccff;
            animation: spin 2s linear infinite;
            width: 70%;
            height: 70%;
            top: 15%;
            left: 15%;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .logo .icon-wrapper .core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 46px;
            height: 46px;
            background: radial-gradient(circle, #4da6ff, #1a5a8a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #fff;
            box-shadow: 0 0 40px rgba(77, 166, 255, 0.3), 0 0 80px rgba(77, 166, 255, 0.1);
            animation: pulseCore 2s ease-in-out infinite;
        }

        @keyframes pulseCore {
            0%, 100% {
                box-shadow: 0 0 40px rgba(77, 166, 255, 0.3), 0 0 80px rgba(77, 166, 255, 0.1);
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                box-shadow: 0 0 60px rgba(77, 166, 255, 0.5), 0 0 120px rgba(77, 166, 255, 0.2);
                transform: translate(-50%, -50%) scale(1.05);
            }
        }

        .logo h1 {
            font-size: 28px;
            color: #ffffff;
            text-shadow: 0 2px 20px rgba(77, 166, 255, 0.15);
        }

        .logo h1 span {
            color: #4da6ff;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 14px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 4px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 16px 12px 46px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .input-wrapper input:focus {
            border-color: #4da6ff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(77, 166, 255, 0.08);
        }

        .input-wrapper input:focus + i {
            color: #4da6ff;
        }

        .input-wrapper input.error {
            border-color: #dc2626;
            box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4da6ff, #2a7ab0);
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 4px;
            box-shadow: 0 4px 15px rgba(77, 166, 255, 0.2);
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #66b8ff, #3a8ac0);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(77, 166, 255, 0.4);
        }

        .btn-login:active {
            transform: scale(0.97);
        }

        .btn-login i {
            margin-right: 8px;
        }

        .error-msg {
            background: rgba(220, 38, 38, 0.15);
            color: #f87171;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            display: none;
            margin-top: 10px;
            border: 1px solid rgba(220, 38, 38, 0.2);
        }

        .error-msg.show {
            display: block;
        }

        /* ============================================
           FOOTER — JAM & TANGGAL RAPI
           ============================================ */
        .footer {
            margin-top: 16px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        .footer .datetime {
            background: rgba(255, 255, 255, 0.04);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .footer .datetime i {
            color: #4da6ff;
            margin-right: 4px;
        }

        .footer .datetime .separator {
            color: rgba(255, 255, 255, 0.15);
            margin: 0 4px;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 480px) {
            .login-card {
                padding: 24px 18px 20px;
                border-radius: 24px;
            }
            .logo .icon-wrapper {
                width: 80px;
                height: 80px;
            }
            .logo .icon-wrapper .core {
                width: 36px;
                height: 36px;
                font-size: 20px;
            }
            .logo h1 {
                font-size: 24px;
            }
            .logo {
                margin-bottom: 18px;
            }
            .btn-login {
                padding: 11px;
                font-size: 15px;
            }
            .input-wrapper input {
                padding: 10px 14px 10px 40px;
                font-size: 13px;
            }
            .footer .datetime {
                font-size: 11px;
                padding: 4px 12px;
                gap: 2px;
            }
            .back-btn {
                padding: 5px 12px;
                font-size: 12px;
                gap: 6px;
            }
            .back-btn .rocket {
                font-size: 16px;
            }
            .back-btn .smoke {
                font-size: 10px;
            }
            .form-group {
                margin-bottom: 12px;
            }
            body {
                padding: 12px;
            }
        }

        @media (max-width: 360px) {
            .footer .datetime {
                font-size: 10px;
                padding: 4px 8px;
                flex-direction: column;
                gap: 1px;
            }
            .footer .datetime .separator {
                display: none;
            }
            .login-card {
                padding: 16px 12px 14px;
            }
        }

        /* ===== DESKTOP ===== */
        @media (min-width: 768px) {
            .login-container {
                max-width: 440px;
            }
            .login-card {
                padding: 32px 32px 28px;
            }
            .logo .icon-wrapper {
                width: 110px;
                height: 110px;
            }
            .logo .icon-wrapper .core {
                width: 50px;
                height: 50px;
                font-size: 28px;
            }
            .logo h1 {
                font-size: 30px;
            }
            .form-group {
                margin-bottom: 16px;
            }
            .input-wrapper input {
                padding: 13px 18px 13px 50px;
                font-size: 15px;
            }
            .btn-login {
                padding: 13px;
                font-size: 17px;
            }
            .footer .datetime {
                font-size: 13px;
                padding: 8px 18px;
            }
            body {
                padding: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== BACKGROUND VIDEO ===== -->
    <video id="bgVideo" autoplay muted loop playsinline>
        <source src="background.mp4" type="video/mp4">
    </video>

    <!-- ===== OVERLAY GELAP ===== -->
    <div class="overlay"></div>

    <!-- ===== LOGIN CONTAINER ===== -->
    <div class="login-container">
        <div class="login-card">

            <!-- ===== TOMBOL BACK KE MYPROJECT ===== -->
            <div class="back-section">
                <a href="myproject.html" class="back-btn">
                    <span class="rocket">🚀</span>
                    <span class="smoke">💨</span>
                    <span class="label">Kembali</span>
                </a>
            </div>

            <!-- ===== LOGO ===== -->
            <div class="logo">
                <div class="icon-wrapper">
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="core">⚛</div>
                </div>
                <h1>ATOM <span>⚡</span></h1>
                <p>Token Listrik • Aman & Terpercaya</p>
            </div>

            <!-- ===== FORM LOGIN ===== -->
            <form id="formLogin" autocomplete="off">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="Masukkan username" required autofocus>
                        <i class="fas fa-user"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Masukkan password" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>
                <div class="error-msg" id="errorMsg">
                    <i class="fas fa-exclamation-circle"></i> Username atau password salah!
                </div>
            </form>

            <!-- ===== FOOTER — JAM & TANGGAL RAPI ===== -->
            <div class="footer">
                <div class="datetime" id="datetime">
                    <i class="fas fa-clock"></i>
                    <span id="clockDisplay">--:--:--</span>
                    <span class="separator">|</span>
                    <span id="dateDisplay">--/--/----</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 1. CEK VIDEO BACKGROUND
        // ============================================================
        (function() {
            const video = document.getElementById('bgVideo');
            video.addEventListener('loadeddata', function() {
                video.style.display = 'block';
            });
            video.addEventListener('error', function() {
                video.style.display = 'none';
            });
            video.load();
        })();

        // ============================================================
        // 2. LOGIN VALIDASI
        // ============================================================
        (function() {
            const form = document.getElementById('formLogin');
            const username = document.getElementById('username');
            const password = document.getElementById('password');
            const errorMsg = document.getElementById('errorMsg');

            const VALID_USERNAME = 'admin';
            const VALID_PASSWORD = 'atom123';

            localStorage.removeItem('atom_logged_in');
            localStorage.removeItem('atom_username');

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                errorMsg.classList.remove('show');
                username.classList.remove('error');
                password.classList.remove('error');

                const user = username.value.trim();
                const pass = password.value.trim();

                if (!user || !pass) {
                    errorMsg.textContent = '⚠️ Username dan password tidak boleh kosong!';
                    errorMsg.classList.add('show');
                    username.classList.add('error');
                    password.classList.add('error');
                    return;
                }

                if (user === VALID_USERNAME && pass === VALID_PASSWORD) {
                    localStorage.setItem('atom_logged_in', 'true');
                    localStorage.setItem('atom_username', user);
                    window.location.href = 'token-listrik.html';
                } else {
                    errorMsg.textContent = '❌ Username atau password salah!';
                    errorMsg.classList.add('show');
                    username.classList.add('error');
                    password.classList.add('error');
                    password.value = '';
                    password.focus();
                }
            });

            username.addEventListener('input', function() {
                errorMsg.classList.remove('show');
                this.classList.remove('error');
            });

            password.addEventListener('input', function() {
                errorMsg.classList.remove('show');
                this.classList.remove('error');
            });
        })();

        // ============================================================
        // 3. JAM & TANGGAL OTOMATIS
        // ============================================================
        function updateClock() {
            const now = new Date();

            let h = String(now.getHours()).padStart(2, '0');
            let m = String(now.getMinutes()).padStart(2, '0');
            let s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clockDisplay').textContent = h + ':' + m + ':' + s;

            let day = String(now.getDate()).padStart(2, '0');
            let month = String(now.getMonth() + 1).padStart(2, '0');
            let year = now.getFullYear();
            let days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            let dayName = days[now.getDay()];
            document.getElementById('dateDisplay').textContent = dayName + ', ' + day + '/' + month + '/' + year;
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>

</body>
</html>
